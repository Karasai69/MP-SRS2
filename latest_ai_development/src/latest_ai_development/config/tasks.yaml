create_appeal:
  description: >
    Студент {student_name} подает апелляцию по экзамену {exam}.
    Он получил оценку {grade}.
    Причина апелляции: {appeal_reason}.

    Сформируй текст апелляции.
  expected_output: "Полный текст апелляции"

review_appeal:
  description: >
    Проанализируй апелляцию студента.
    Определи насколько аргументы убедительны.
  expected_output: "Анализ апелляции"

make_decision:
  description: >
    На основе анализа апелляции прими решение:
    удовлетворить апелляцию или отклонить.
  expected_output: "Финальное решение комиссии"